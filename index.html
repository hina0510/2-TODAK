<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>TODAK - 토닥</title>

  <!-- Google Fonts: NanumSquare (한글), Be Vietnam Pro (소셜 버튼) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Square:wght@400;700;800&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/color.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- =====================================================
         LOGIN SECTION
         ===================================================== -->
    <section id="login-section" class="section">

      <!-- 상단 헤더 (로고) -->
      <header class="login-header">
        <div class="login-logo">
          <!-- TODO: 이미지를 image/ 폴더에 저장 후 경로 교체 (Figma URL은 7일 후 만료됨) -->
          <img
            src="https://www.figma.com/api/mcp/asset/b476fd15-4309-48eb-b66e-5be41749f434"
            alt="TODAK"
            width="41"
            height="36"
          >
        </div>
      </header>

      <!-- 메인 컨텐츠 -->
      <main class="login-main">

        <!-- 웰컴 섹션 (마스코트 + 인사말) -->
        <div class="login-welcome">
          <div class="mascot-wrap">
            <div class="mascot-blur"></div>
            <div class="mascot-circle">
              <!-- TODO: image/mascot-login.png 로 교체 -->
              <img
                src="https://www.figma.com/api/mcp/asset/3099a4dc-f8f7-4554-8d9f-dd5cd18c9059"
                alt="토닥 캐릭터"
                width="100"
                height="100"
              >
            </div>
          </div>
          <h1 class="login-heading">반가워요, 부모님</h1>
          <p class="login-subtext">
            아이와 함께하는 따뜻한 성장 일기,<br>
            토닥과 함께 시작해보세요.
          </p>
        </div>

        <!-- 로그인 폼 -->
        <div class="login-form-area">
          <form id="login-form" novalidate>

            <div class="login-inputs">

              <!-- 이메일 인풋 -->
              <div class="login-input-wrap">
                <span class="login-input-icon">
                  <img
                    src="https://www.figma.com/api/mcp/asset/33f206b4-3fbe-42f0-b4c6-dee5e958c603"
                    alt=""
                    width="20"
                    height="16"
                  >
                </span>
                <input
                  type="email"
                  id="login-email"
                  class="login-input"
                  placeholder="이메일 주소를 입력하세요"
                  autocomplete="email"
                >
              </div>

              <!-- 비밀번호 인풋 -->
              <div class="login-input-wrap">
                <span class="login-input-icon">
                  <img
                    src="https://www.figma.com/api/mcp/asset/27a78769-9da3-4dfd-8bdb-10e6654042ac"
                    alt=""
                    width="16"
                    height="21"
                  >
                </span>
                <input
                  type="password"
                  id="login-password"
                  class="login-input login-input--pw"
                  placeholder="비밀번호를 입력하세요"
                  autocomplete="current-password"
                >
                <button type="button" class="pw-toggle-btn" id="pw-toggle" aria-label="비밀번호 표시/숨기기">
                  <img
                    src="https://www.figma.com/api/mcp/asset/5e850afe-fd6a-4374-91a8-c68c5d957628"
                    alt=""
                    width="22"
                    height="15"
                  >
                </button>
              </div>

            </div>

            <!-- 로그인 유지 + 비밀번호 찾기 -->
            <div class="login-options">
              <label class="remember-me">
                <input type="checkbox" id="remember-check" class="sr-only">
                <span class="remember-box"></span>
                <span class="remember-text">로그인 유지</span>
              </label>
              <button type="button" class="forgot-pw-btn">비밀번호 찾기</button>
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit" class="btn-login">로그인</button>

          </form>
        </div>

        <!-- 간편 로그인 구분선 -->
        <div class="social-divider">
          <span class="divider-line"></span>
          <span class="divider-label">간편 로그인</span>
          <span class="divider-line"></span>
        </div>

        <!-- 소셜 로그인 버튼 -->
        <div class="social-btns">
          <button type="button" class="btn-social btn-google">
            <img
              src="https://www.figma.com/api/mcp/asset/30fdb5e2-3d11-4740-abbc-91b9aa656ba2"
              alt=""
              width="16"
              height="16"
            >
            <span>Google</span>
          </button>
          <button type="button" class="btn-social btn-kakao">
            <img
              src="https://www.figma.com/api/mcp/asset/85e6c648-499b-4646-9a40-65a7948a33f8"
              alt=""
              width="24"
              height="24"
            >
            <span>Kakao</span>
          </button>
        </div>

        <!-- 회원가입 유도 (푸터) -->
        <div class="signup-nudge">
          <p class="signup-nudge__text">아직 회원이 아니신가요?</p>
          <button type="button" class="btn-todak-start" data-goto="role-selection-section">
            토닥 시작하기
          </button>
        </div>

      </main>
    </section>
    <!-- /#login-section -->


    <!-- =====================================================
         SIGNUP SECTION (Phase 3)
         ===================================================== -->
    <section id="signup-section" class="section hidden">

      <!-- 상단 헤더 (뒤로가기 + 중앙 제목) -->
      <header class="header header--center">
        <button
          type="button"
          class="header__back-btn"
          id="signup-back"
          aria-label="뒤로가기"
        >
          <svg width="11" height="20" viewBox="0 0 11 20" fill="none" aria-hidden="true">
            <path d="M9.5 1.5L1.5 10L9.5 18.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="header__title header__title--rose">회원가입</h1>
        <span class="header__spacer" aria-hidden="true"></span>
      </header>

      <!-- 스크롤 영역 -->
      <main class="signup-main">

        <!-- 히어로: 캐릭터 + 브랜드 + 슬로건 -->
        <div class="signup-hero">
          <div class="signup-hero__character">
            <div class="signup-hero__glow" aria-hidden="true"></div>
            <!-- TODO: image/signup-character.png 로 교체 (Figma URL은 7일 후 만료) -->
            <img
              src="https://www.figma.com/api/mcp/asset/ee3df320-1f5a-4d10-8aaf-4f7e68680d0e"
              alt="토닥 캐릭터"
              class="signup-hero__img"
              width="110"
              height="96"
            >
          </div>
          <p class="signup-hero__brand" aria-label="TODAK">
            <span class="signup-hero__brand-to">TO</span><span class="signup-hero__brand-dak">DAK</span>
          </p>
          <p class="signup-tagline">따뜻한 동행의 시작</p>
          <p class="signup-subtitle">토닥과 함께 아이와의 소중한 시간을 기록하세요.</p>
        </div>

        <!-- 회원가입 폼 -->
        <form id="signup-form" class="signup-form" novalidate>

          <!-- 이름 -->
          <div class="input-group">
            <div class="input-label-pad">
              <label class="input-label input-label--form" for="signup-name">이름</label>
            </div>
            <div class="input-with-icon">
              <span class="input-with-icon__icon-left" aria-hidden="true">
                <svg width="16" height="18" viewBox="0 0 16 18" fill="none">
                  <ellipse cx="8" cy="5.5" rx="4.5" ry="5" fill="#dcbfc7"/>
                  <path d="M1 18C1 13.582 4.134 10 8 10C11.866 10 15 13.582 15 18" fill="#dcbfc7"/>
                </svg>
              </span>
              <input
                type="text"
                id="signup-name"
                class="input-field input-field--form input-with-icon__field"
                placeholder="실명을 입력해주세요"
                autocomplete="name"
              >
            </div>
          </div>

          <!-- 이메일 -->
          <div class="input-group">
            <div class="input-label-pad">
              <label class="input-label input-label--form" for="signup-email">이메일</label>
            </div>
            <div class="input-with-icon">
              <span class="input-with-icon__icon-left" aria-hidden="true">
                <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
                  <rect x="1" y="1" width="18" height="14" rx="2" stroke="#dcbfc7" stroke-width="1.5"/>
                  <path d="M1 4.5L10 10L19 4.5" stroke="#dcbfc7" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </span>
              <input
                type="email"
                id="signup-email"
                class="input-field input-field--form input-with-icon__field"
                placeholder="example@todak.com"
                autocomplete="email"
              >
            </div>
          </div>

          <!-- 비밀번호 -->
          <div class="input-group">
            <div class="input-label-pad">
              <label class="input-label input-label--form" for="signup-password">비밀번호</label>
            </div>
            <div class="input-with-icon">
              <span class="input-with-icon__icon-left" aria-hidden="true">
                <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
                  <rect x="1" y="8" width="14" height="11" rx="2" stroke="#dcbfc7" stroke-width="1.5"/>
                  <path d="M4 8V5.5C4 3.567 5.791 2 8 2C10.209 2 12 3.567 12 5.5V8" stroke="#dcbfc7" stroke-width="1.5"/>
                  <circle cx="8" cy="13.5" r="1.5" fill="#dcbfc7"/>
                </svg>
              </span>
              <input
                type="password"
                id="signup-password"
                class="input-field input-field--form input-with-icon__field input-with-icon__field--with-right"
                placeholder="8자 이상 입력해주세요"
                autocomplete="new-password"
              >
              <button
                type="button"
                class="input-with-icon__icon-right"
                id="signup-pw-toggle"
                aria-label="비밀번호 표시/숨기기"
              >
                <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
                  <path d="M1 8C1 8 4.5 1 11 1C17.5 1 21 8 21 8C21 8 17.5 15 11 15C4.5 15 1 8 1 8Z" stroke="#dcbfc7" stroke-width="1.5" stroke-linejoin="round"/>
                  <circle cx="11" cy="8" r="3" stroke="#dcbfc7" stroke-width="1.5"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="input-group">
            <div class="input-label-pad">
              <label class="input-label input-label--form" for="signup-password-confirm">비밀번호 확인</label>
            </div>
            <div class="input-with-icon">
              <span class="input-with-icon__icon-left" aria-hidden="true">
                <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
                  <path d="M8 1L1 4V10C1 14.418 4.134 18.418 8 19C11.866 18.418 15 14.418 15 10V4L8 1Z" stroke="#dcbfc7" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M5 10L7 12L11 8" stroke="#dcbfc7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input
                type="password"
                id="signup-password-confirm"
                class="input-field input-field--form input-with-icon__field"
                placeholder="비밀번호를 한번 더 입력해주세요"
                autocomplete="new-password"
              >
            </div>
          </div>

          <!-- 역할 선택 -->
          <div class="input-group">
            <div class="input-label-pad">
              <span class="input-label input-label--form">역할 선택</span>
            </div>
            <div class="btn-radio-group btn-radio-group--role" role="group" aria-label="역할 선택">
              <button
                type="button"
                class="btn-radio btn-radio--pill selected"
                id="signup-role-mom"
                aria-pressed="true"
              >엄마</button>
              <button
                type="button"
                class="btn-radio btn-radio--pill"
                id="signup-role-guardian"
                aria-pressed="false"
              >보호자</button>
            </div>
          </div>

          <!-- 이용약관 동의 -->
          <label class="form-check">
            <input type="checkbox" class="sr-only" id="signup-agree">
            <span class="form-check__box"></span>
            <span class="form-check__text">
              <strong>[필수]</strong> 서비스 이용약관 및 개인정보 수집·이용에 동의합니다.
            </span>
          </label>

          <!-- 회원가입 완료 버튼 -->
          <button type="submit" class="btn btn--pill w-full">회원가입 완료</button>

        </form>
        <!-- /#signup-form -->

        <!-- 하단: 로그인 링크 -->
        <div class="signup-footer">
          <p class="divider--text">이미 계정이 있으신가요?</p>
          <button type="button" class="text-link" data-goto="login-section">
            기존 계정으로 로그인하기
          </button>
        </div>

      </main>

    </section>
    <!-- /#signup-section -->


    <!-- =====================================================
         ROLE SELECTION SECTION (Phase 3 — 회원가입 직후)
         ===================================================== -->
    <section id="role-selection-section" class="section hidden">

      <!-- 상단 앱바 (뒤로가기) -->
      <header class="header">
        <button
          type="button"
          class="header__back-btn"
          id="role-sel-back"
          aria-label="뒤로가기"
        >
          <svg width="11" height="20" viewBox="0 0 11 20" fill="none" aria-hidden="true">
            <path d="M9.5 1.5L1.5 10L9.5 18.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </header>

      <!-- 메인 콘텐츠 -->
      <main class="role-sel-main">
        <div class="role-sel-container">

          <!-- 헤딩 영역 -->
          <div class="role-sel-card-header">
            <h1 class="role-sel-title">당신의 역할을 선택해주세요</h1>
            <p class="role-sel-subtitle">맞춤형 성장을 위해 보호자 유형을 알려주세요.</p>
          </div>

          <!-- 역할 카드 목록 -->
          <div class="role-sel-options" role="group" aria-label="역할 선택">

            <!-- 엄마 카드 (기본 선택) -->
            <button
              type="button"
              class="role-card role-card--selected"
              id="role-card-mom"
              data-role="mom"
              aria-pressed="true"
            >
              <div class="role-card__icon role-card__icon--magenta" aria-hidden="true">
                <!-- 엄마 / 사람 아이콘 (흰색, 마젠타 원 위) -->
                <svg width="32" height="30" viewBox="0 0 32 30" fill="none" aria-hidden="true">
                  <ellipse cx="16" cy="9.5" rx="7.5" ry="8.5" fill="white"/>
                  <path d="M1 31C1 22.163 7.716 15 16 15C24.284 15 31 22.163 31 31" fill="white"/>
                </svg>
              </div>
              <strong class="role-card__name">엄마</strong>
              <p class="role-card__desc">
                아이와 가장 가까이에서<br>
                소중한 시간을 기록해요
              </p>
            </button>

            <!-- 보호자 카드 -->
            <button
              type="button"
              class="role-card"
              id="role-card-guardian"
              data-role="guardian"
              aria-pressed="false"
            >
              <div class="role-card__icon role-card__icon--lavender" aria-hidden="true">
                <!-- 가족 / 보호자 아이콘 (라벤더 계열, 연보라 원 위) -->
                <svg width="34" height="20" viewBox="0 0 34 20" fill="none" aria-hidden="true">
                  <circle cx="11" cy="6" r="5.5" fill="#9B8EC7"/>
                  <path d="M1 20C1 13.925 5.477 9 11 9C16.523 9 21 13.925 21 20" fill="#9B8EC7"/>
                  <circle cx="23" cy="6" r="5.5" fill="#9B8EC7"/>
                  <path d="M13 20C13 13.925 17.477 9 23 9C28.523 9 33 13.925 33 20" fill="#9B8EC7"/>
                </svg>
              </div>
              <strong class="role-card__name">보호자</strong>
              <p class="role-card__desc">
                함께 아이의 성장을 응원하고<br>
                기록을 공유받아요
              </p>
            </button>

          </div>
          <!-- /.role-sel-options -->

          <!-- 다음 버튼 -->
          <div class="role-sel-footer">
            <button type="button" class="btn btn--pill w-full" id="role-sel-next">
              다음
            </button>
          </div>

        </div>
        <!-- /.role-sel-container -->
      </main>

    </section>
    <!-- /#role-selection-section -->


    <!-- =====================================================
         ONBOARDING SECTION (Phase 4)
         ===================================================== -->
    <section id="onboarding-section" class="section hidden">

      <!-- 배경 장식 블러 원 -->
      <div class="onboarding-bg-deco" aria-hidden="true">
        <div class="onboarding-bg-deco__blob onboarding-bg-deco__blob--pink"></div>
        <div class="onboarding-bg-deco__blob onboarding-bg-deco__blob--lavender"></div>
      </div>

      <!-- 장식용 블러 배경 카드 (모달 뒤에 보이는 흐릿한 스켈레톤) -->
      <div class="onboarding-bg-content" aria-hidden="true">
        <div class="onboarding-bg-card onboarding-bg-card--lg"></div>
        <div class="onboarding-bg-card-row">
          <div class="onboarding-bg-card onboarding-bg-card--md"></div>
          <div class="onboarding-bg-card onboarding-bg-card--md"></div>
        </div>
        <div class="onboarding-bg-card onboarding-bg-card--sm"></div>
      </div>

      <!-- 모달 오버레이 (항상 active) -->
      <div class="modal-overlay modal-overlay--center active" id="onboarding-overlay">
        <div
          class="modal modal--dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="onboarding-title"
        >

          <!-- 모달 헤더 -->
          <div class="modal__dialog-header">
            <h2 class="modal__dialog-title" id="onboarding-title">초기 아이 정보 설정</h2>
            <p class="modal__dialog-subtitle">아이와의 첫 만남을 위해 정보를 입력해주세요.</p>
          </div>

          <!-- 모달 본문 -->
          <div class="modal__body">

            <!-- 현재 상태 (엄마 선택 시에만 표시) -->
            <div class="input-group form-section form-section--mom-only">
              <div class="input-label-pad">
                <span class="input-label input-label--form">현재 상태</span>
              </div>
              <div class="btn-radio-group" role="group" aria-label="현재 상태 선택">

                <!-- 임신 버튼 (기본 선택) -->
                <button
                  type="button"
                  class="btn-radio btn-radio--status selected"
                  aria-pressed="true"
                  id="status-pregnant"
                >
                  <span class="btn-radio__icon">
                    <svg width="20" height="18" viewBox="0 0 20 18" fill="none" aria-hidden="true">
                      <path d="M10 16.5L1.5 8.5C0.5 7.5 0 6.2 0 5C0 2.2 2.2 0 5 0C6.5 0 7.9 0.65 8.9 1.7L10 2.8L11.1 1.7C12.1 0.65 13.5 0 15 0C17.8 0 20 2.2 20 5C20 6.2 19.5 7.5 18.5 8.5L10 16.5Z" fill="#D94F8A"/>
                    </svg>
                  </span>
                  임신
                </button>

                <!-- 출산 버튼 -->
                <button
                  type="button"
                  class="btn-radio btn-radio--status"
                  aria-pressed="false"
                  id="status-birth"
                >
                  <span class="btn-radio__icon">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                      <circle cx="9" cy="9" r="8" stroke="#564147" stroke-width="1.5"/>
                      <circle cx="6.5" cy="7" r="1" fill="#564147"/>
                      <circle cx="11.5" cy="7" r="1" fill="#564147"/>
                      <path d="M6 11C6.7 12.5 7.8 13 9 13C10.2 13 11.3 12.5 12 11" stroke="#564147" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                  출산
                </button>

              </div>
            </div>
            <!-- /현재 상태 -->

            <!-- 태명 (엄마 선택 시에만 표시) -->
            <div class="input-group form-section form-section--mom-only">
              <div class="input-label-pad">
                <label class="input-label input-label--form" for="onboarding-taemyeong">태명</label>
              </div>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="onboarding-taemyeong"
                  class="input-field input-field--card"
                  placeholder="예: 토닥이"
                  autocomplete="off"
                >
                <span class="input-wrapper__icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M13 2L16 5L6 15L2 16L3 12L13 2Z" stroke="#DCBFC7" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M11 4L14 7" stroke="#DCBFC7" stroke-width="1.5"/>
                  </svg>
                </span>
              </div>
            </div>
            <!-- /태명 -->

            <!-- 출산 예정일 / 출산일 (엄마 선택 시에만 표시) -->
            <div class="input-group form-section form-section--mom-only">
              <div class="input-label-pad">
                <label class="input-label input-label--form" for="onboarding-due-date" id="due-date-label">출산 예정일</label>
              </div>
              <div class="input-wrapper">
                <input
                  type="date"
                  id="onboarding-due-date"
                  class="input-field input-field--card input-field--date"
                >
                <span class="input-wrapper__icon" aria-hidden="true">
                  <svg width="18" height="20" viewBox="0 0 18 20" fill="none">
                    <rect x="1" y="3" width="16" height="16" rx="3" stroke="#DCBFC7" stroke-width="1.5"/>
                    <path d="M5 1V5M13 1V5" stroke="#DCBFC7" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M1 8H17" stroke="#DCBFC7" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </span>
              </div>
            </div>
            <!-- /출산 예정일 -->

            <!-- 엄마 코드 (보호자 선택 시에만 표시) -->
            <div class="input-group form-section form-section--guardian-only">
              <div class="input-label-pad">
                <label class="input-label input-label--form" for="onboarding-mom-code">엄마 코드</label>
              </div>
              <input
                type="text"
                id="onboarding-mom-code"
                class="input-field input-field--card"
                placeholder="엄마 코드를 입력해주세요"
                autocomplete="off"
              >
            </div>
            <!-- /엄마 코드 -->

            <!-- 나의 역할 (항상 표시) -->
            <div class="input-group">
              <div class="input-label-pad">
                <span class="input-label input-label--form">나의 역할</span>
              </div>
              <div class="btn-radio-group btn-radio-group--role" role="group" aria-label="역할 선택">

                <!-- 엄마 (기본 선택) -->
                <button
                  type="button"
                  class="btn-radio btn-radio--pill selected"
                  aria-pressed="true"
                  id="role-mom"
                >
                  엄마
                </button>

                <!-- 보호자 -->
                <button
                  type="button"
                  class="btn-radio btn-radio--pill"
                  aria-pressed="false"
                  id="role-guardian"
                >
                  보호자
                </button>

              </div>
            </div>
            <!-- /나의 역할 -->

          </div>
          <!-- /.modal__body -->

          <!-- 모달 푸터 -->
          <div class="modal__footer">
            <button type="button" class="btn btn--primary btn--cta w-full" id="onboarding-start-btn">
              시작하기
            </button>
          </div>

        </div>
        <!-- /.modal--dialog -->
      </div>
      <!-- /.modal-overlay -->

    </section>


    <!-- =====================================================
         HOME SECTION (Phase 5에서 구현)
         ===================================================== -->
    <section id="home-section" class="section hidden">
      <div class="section-placeholder">홈 화면 (준비 중)</div>
    </section>


    <!-- =====================================================
         RECORD SECTION (Phase 6에서 구현)
         ===================================================== -->
    <section id="record-section" class="section hidden">
      <div class="section-placeholder">기록 화면 (준비 중)</div>
    </section>


    <!-- =====================================================
         GUIDE SECTION (Phase 7에서 구현)
         ===================================================== -->
    <section id="guide-section" class="section hidden">
      <div class="section-placeholder">가이드 화면 (준비 중)</div>
    </section>


    <!-- =====================================================
         MYPAGE SECTION (Phase 8에서 구현)
         ===================================================== -->
    <section id="mypage-section" class="section hidden">
      <div class="section-placeholder">마이페이지 (준비 중)</div>
    </section>


  </div><!-- /#app -->

  <!-- 공통 유틸리티 -->
  <script src="js/utils.js"></script>
  <!-- 앱 메인 스크립트 -->
  <script src="js/script.js"></script>
</body>
</html>
